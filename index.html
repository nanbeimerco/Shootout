<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shootout</title>

    <!-- Required local libraries in ./libs folder -->
    <script src="./libs/react.development.js"></script>
    <script src="./libs/react-dom.development.js"></script>
    <script src="./libs/babel.min.js"></script>
    <script src="./libs/tailwindcss.js"></script>
    <script src="./libs/lucide.js"></script>

    <!-- Tailwind Config -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            colors: {
                                background: "hsl(var(--background))",
                                foreground: "hsl(var(--foreground))",
                                muted: "hsl(var(--muted))",
                                "muted-foreground": "hsl(var(--muted-foreground))",
                                primary: "hsl(var(--primary))",
                                "primary-foreground": "hsl(var(--primary-foreground))",
                                border: "hsl(var(--border))",
                                destructive: "hsl(var(--destructive))",
                            }
                        }
                    }
                };
            }
        });
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap');

        :root {
            --background: 0 0% 0%;
            --foreground: 0 0% 100%;
            --muted: 0 0% 10%;
            --muted-foreground: 0 0% 60%;
            --primary: 0 0% 100%;
            --primary-foreground: 0 0% 0%;
            --border: 0 0% 20%;
            --destructive: 0 62.8% 30.6%;
            --viz-color: 255, 255, 255;
            --slider-thumb: #fff;
            --slider-track-fill: white;
            --slider-track-bg: #333;
        }

        [data-theme="light"] {
            --background: 0 0% 97%;
            --foreground: 0 0% 5%;
            --muted: 0 0% 91%;
            --muted-foreground: 0 0% 40%;
            --primary: 0 0% 10%;
            --primary-foreground: 0 0% 97%;
            --border: 0 0% 82%;
            --destructive: 0 62.8% 50%;
            --viz-color: 30, 30, 30;
            --slider-thumb: #222;
            --slider-track-fill: #222;
            --slider-track-bg: #ccc;
        }

        body {
            font-family: 'Atkinson Hyperlegible', sans-serif;
            background-color: hsl(var(--background));
            color: hsl(var(--foreground));
            overflow-x: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Fixed Range Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: transparent;
            cursor: pointer;
            height: 6px;
            border-radius: 999px;
        }

        input[type=range]:focus {
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: var(--slider-thumb);
            margin-top: -5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            border: 2px solid var(--slider-thumb);
            transition: transform 0.1s;
        }

        input[type=range]:active::-webkit-slider-thumb {
            transform: scale(1.3);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            border-radius: 999px;
            background: transparent;
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .drag-over {
            border-top: 2px solid hsl(var(--primary)) !important;
        }

        .dragging {
            opacity: 0.4;
        }

        /* Auto-hiding Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            background-color: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background-color: transparent;
            border-radius: 5px;
            border: 2px solid transparent;
            background-clip: padding-box;
        }
        body:hover::-webkit-scrollbar-thumb,
        .overflow-y-auto:hover::-webkit-scrollbar-thumb {
            background-color: rgba(150, 150, 150, 0.3);
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: rgba(150, 150, 150, 0.6) !important;
        }

        /* Custom Hover Titlebar */
        #titlebar-container {
            position: fixed; top: 0; left: 0; right: 0; height: 12px; z-index: 99999;
        }
        #custom-titlebar {
            position: absolute; top: 0; left: 0; right: 0; height: 32px;
            background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(4px);
            display: flex; justify-content: space-between; align-items: center; padding: 0 16px;
            transform: translateY(-100%); transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-app-region: drag; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        #titlebar-container:hover #custom-titlebar {
            transform: translateY(0);
        }
        .titlebar-btn {
            -webkit-app-region: no-drag; background: transparent; border: none; color: #a1a1aa;
            width: 32px; height: 24px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.1s; outline: none;
        }
        .titlebar-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .titlebar-btn.close:hover { background: #ef4444; color: #fff; }
    </style>
</head>

<body>
    <div id="titlebar-container">
        <div id="custom-titlebar">
            <div style="font-size: 11px; font-weight: bold; color: #a1a1aa;">Shootout</div>
            <div style="display: flex; gap: 4px;">
                <button class="titlebar-btn" onclick="require('electron').ipcRenderer.send('window-min')">
                    <svg width="10" height="10" viewBox="0 0 10 10"><path fill="currentColor" d="M1,4.5 h8 v1 h-8 z"/></svg>
                </button>
                <button class="titlebar-btn" onclick="require('electron').ipcRenderer.send('window-max')">
                    <svg width="10" height="10" viewBox="0 0 10 10"><path fill="currentColor" d="M1,1 h8 v8 h-8 z M2,2 v6 h6 v-6 z"/></svg>
                </button>
                <button class="titlebar-btn close" onclick="require('electron').ipcRenderer.send('window-close')">
                    <svg width="10" height="10" viewBox="0 0 10 10"><path fill="currentColor" d="M1,1 l8,8 m0,-8 l-8,8" stroke="currentColor" stroke-width="1.5"/></svg>
                </button>
            </div>
        </div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const child_process = typeof window !== 'undefined' && window.require ? window.require('child_process') : null;
        const path_mod = typeof window !== 'undefined' && window.require ? window.require('path') : null;
        const fs = typeof window !== 'undefined' && window.require ? window.require('fs') : null;

        const STATE_FILE = path_mod ? path_mod.join(__dirname, 'app_state.json') : null;
        const loadState = () => {
            if (fs && STATE_FILE && fs.existsSync(STATE_FILE)) {
                try { return JSON.parse(fs.readFileSync(STATE_FILE, 'utf8')); } catch(e) { return null; }
            }
            return null;
        };
        const savedState = loadState() || {};

        // --- Icon Setup ---
        const createIcon = (name) => {
            return (props) => {
                if (typeof lucide === 'undefined' || !lucide.icons || !lucide.icons[name]) {
                    return <div className="inline-block border border-zinc-700 w-5 h-5 rounded" />;
                }
                const { color = "currentColor", size = 24, strokeWidth = 2, className = "", ...others } = props;
                return React.createElement(
                    'svg',
                    {
                        xmlns: "http://www.w3.org/2000/svg",
                        width: size,
                        height: size,
                        viewBox: "0 0 24 24",
                        fill: "none",
                        stroke: color,
                        strokeWidth: strokeWidth,
                        strokeLinecap: "round",
                        strokeLinejoin: "round",
                        className: `lucide lucide-${name.toLowerCase()} ${className}`,
                        ...others
                    },
                    ...lucide.icons[name].map(([tag, attrs]) => React.createElement(tag, attrs))
                );
            };
        };

        const Activity = createIcon('Activity');
        const Upload = createIcon('Upload');
        const Play = createIcon('Play');
        const Pause = createIcon('Pause');
        const Import = createIcon('Import');
        const Plus = createIcon('Plus');
        const Trash2 = createIcon('Trash2');
        const Award = createIcon('Award');
        const RotateCcw = createIcon('RotateCcw');
        const BarChart3 = createIcon('BarChart3');
        const Settings = createIcon('Settings');
        const Loader2 = createIcon('Loader2');
        const FileText = createIcon('FileText');
        const Sliders = createIcon('Sliders');
        const List = createIcon('List');
        const X = createIcon('X');
        const Power = createIcon('Power');
        const AlertCircle = createIcon('AlertCircle');
        const Sun = createIcon('Sun');
        const Moon = createIcon('Moon');
        const Download = createIcon('Download');
        const Clock = createIcon('Clock');
        const GripVertical = createIcon('GripVertical');
        const TrendingUp = createIcon('TrendingUp');
        const Music = createIcon('Music');
        const Camera = createIcon('Camera');

        // --- Song RMS Helper ---
        const calcSongRMS = (buffer) => {
            const dur = Math.min(10, buffer.duration);
            const start = buffer.duration > 20 ? buffer.duration / 2 - 5 : 0;
            const sampleRate = buffer.sampleRate;
            const data = buffer.getChannelData(0).slice(Math.floor(start * sampleRate), Math.floor((start + dur) * sampleRate));
            let sum = 0; for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
            return Math.sqrt(sum / data.length);
        };

        // --- Visualizer ---
        const Visualizer = ({ analyser, isActive }) => {
            const canvasRef = useRef(null);
            const animationRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas || !analyser) return;
                const ctx = canvas.getContext('2d');
                const dataArray = new Uint8Array(analyser.frequencyBinCount);

                const draw = () => {
                    if (!isActive) {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        return;
                    }
                    animationRef.current = requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const barWidth = (canvas.width / dataArray.length) * 2.0;
                    let x = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        const barHeight = (dataArray[i] / 255) * canvas.height;
                        const vc = getComputedStyle(document.documentElement).getPropertyValue('--viz-color').trim() || '255,255,255';
                        ctx.fillStyle = `rgba(${vc}, ${0.8 + (barHeight / canvas.height) * 0.2})`;
                        ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                        x += barWidth;
                        if (x > canvas.width) break;
                    }
                };
                if (isActive) draw(); else ctx.clearRect(0, 0, canvas.width, canvas.height);
                return () => cancelAnimationFrame(animationRef.current);
            }, [analyser, isActive]);

            return <canvas ref={canvasRef} width={800} height={240} className="w-full h-32 rounded-lg mt-4 opacity-90" />;
        };

        // --- Glicko-2 Logic ---
        const TAU = 0.5; // system constant
        const glicko2Scale = (r, rd) => ({ mu: (r - 1500) / 173.7178, phi: rd / 173.7178 });
        const glicko2Unscale = (mu, phi) => ({ rating: mu * 173.7178 + 1500, rd: phi * 173.7178 });
        const g_phi = (phi) => 1 / Math.sqrt(1 + 3 * phi * phi / (Math.PI * Math.PI));
        const E_glicko2 = (mu, mu_j, phi_j) => 1 / (1 + Math.exp(-g_phi(phi_j) * (mu - mu_j)));

        const calculateRatingUpdate = (p1, p2, outcome) => {
            const r1 = p1.rating || 1500, rd1 = p1.rd || 350, vol1 = p1.vol || 0.06;
            const r2 = p2.rating || 1500, rd2 = p2.rd || 350;
            const s1 = glicko2Scale(r1, rd1);
            const s2 = glicko2Scale(r2, rd2);
            const gp = g_phi(s2.phi);
            const E = E_glicko2(s1.mu, s2.mu, s2.phi);
            const v = 1 / (gp * gp * E * (1 - E));
            const delta = v * gp * (outcome - E);
            // Volatility update (Illinois algorithm)
            const a = Math.log(vol1 * vol1);
            const phi2 = s1.phi * s1.phi;
            const f = (x) => {
                const ex = Math.exp(x);
                const d2 = delta * delta;
                const num = ex * (d2 - phi2 - v - ex);
                const den = 2 * (phi2 + v + ex) * (phi2 + v + ex);
                return num / den - (x - a) / (TAU * TAU);
            };
            let A = a;
            let B = delta * delta > phi2 + v ? Math.log(delta * delta - phi2 - v) : (() => { let k = 1; while (f(a - k * TAU) < 0) k++; return a - k * TAU; })();
            let fA = f(A), fB = f(B);
            for (let i = 0; i < 100 && Math.abs(B - A) > 1e-6; i++) {
                const C = A + (A - B) * fA / (fB - fA);
                const fC = f(C);
                if (fC * fB <= 0) { A = B; fA = fB; } else { fA /= 2; }
                B = C; fB = fC;
            }
            const newVol = Math.exp(B / 2);
            const phiStar = Math.sqrt(phi2 + newVol * newVol);
            const newPhi = 1 / Math.sqrt(1 / (phiStar * phiStar) + 1 / v);
            const newMu = s1.mu + newPhi * newPhi * gp * (outcome - E);
            const result = glicko2Unscale(newMu, newPhi);
            return { rating: result.rating, rd: Math.max(result.rd, 30), vol: newVol };
        };

        const serializeToAPO = (p) => {
            let l = []; if (p.preamp !== 0) l.push(`Preamp: ${p.preamp} dB`);
            p.bands.forEach((b, i) => l.push(`Filter ${i + 1}: ON ${b.type === 'lowshelf' ? 'LS' : b.type === 'highshelf' ? 'HS' : 'PK'} Fc ${b.freq} Hz Gain ${b.gain} dB Q ${b.q}`));
            return l.join('\n');
        };

        const parseEqualizerAPO = (text) => {
            const bands = []; let preamp = 0;
            text.split('\n').forEach(line => {
                line = line.trim(); if (!line || line.startsWith('#')) return;
                if (line.toLowerCase().startsWith('preamp:')) preamp = parseFloat(line.split(':')[1]) || 0;
                else if (line.toLowerCase().startsWith('filter')) {
                    const fm = line.match(/Fc\s+(\d+(?:\.\d+)?)/i), gm = line.match(/Gain\s+([+-]?\d+(?:\.\d+)?)/i), qm = line.match(/Q\s+(\d+(?:\.\d+)?)/i);
                    if (fm && gm) bands.push({ freq: parseFloat(fm[1]), gain: parseFloat(gm[1]), q: qm ? parseFloat(qm[1]) : 1.0, type: line.includes('LS') ? 'lowshelf' : line.includes('HS') ? 'highshelf' : 'peaking' });
                }
            });
            return { bands, preamp };
        };

        function App() {
            const [playlist, setPlaylist] = useState([]);
            const [currentSongIndex, setCurrentSongIndex] = useState(0);
            const [isSongLoading, setIsSongLoading] = useState(false);
            const [loadingMessage, setLoadingMessage] = useState("");
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [volume, setVolume] = useState(0.8);
            const [showPlaylist, setShowPlaylist] = useState(false);
            const [playbackStartPos, setPlaybackStartPos] = useState(0);

            const [eqProfiles, setEqProfiles] = useState(() => savedState.eqProfiles || JSON.parse(localStorage.getItem('eq_blind_test_profiles') || '[]'));
            const [history, setHistory] = useState(() => savedState.history || JSON.parse(localStorage.getItem('eq_blind_test_history') || '[]'));
            const [mode, setMode] = useState('setup');
            const [currentPair, setCurrentPair] = useState({ hiddenA: null, hiddenB: null });
            const [activeSource, setActiveSource] = useState(null);
            const [editorModes, setEditorModes] = useState({});
            const [testQueue, setTestQueue] = useState([]);
            const [isResetConfirming, setIsResetConfirming] = useState(false);
            const [autoGainCache, setAutoGainCache] = useState({});
            const [theme, setTheme] = useState(() => savedState.theme || localStorage.getItem('eq_blind_test_theme') || 'dark');
            const [normalizationMethod, setNormalizationMethod] = useState(() => savedState.normalizationMethod || localStorage.getItem('eq_blind_test_norm_method') || 'neuro_lufs');
            const [neuroLufsData, setNeuroLufsData] = useState({});
            const [modelWeights, setModelWeights] = useState(null);
            const [roundStartTime, setRoundStartTime] = useState(null);
            const [dragIndex, setDragIndex] = useState(null);
            const [dragOverIndex, setDragOverIndex] = useState(null);
            const [historyShowCount, setHistoryShowCount] = useState(20);
            const [selectedSongFilter, setSelectedSongFilter] = useState('__all__');

            const audioCtxRef = useRef(null);
            const sourceNodeRef = useRef(null);
            const gainNodeRef = useRef(null);
            const analyserNodeRef = useRef(null);
            const preampNodeRef = useRef(null);
            const songLoudnessGainRef = useRef(null);
            const startTimeRef = useRef(0);
            const pauseTimeRef = useRef(0);
            const playbackStartPosRef = useRef(0);
            const animationRef = useRef(null);
            const isPlayingRef = useRef(false);

            useEffect(() => { localStorage.setItem('eq_blind_test_profiles', JSON.stringify(eqProfiles)); }, [eqProfiles]);
            useEffect(() => { localStorage.setItem('eq_blind_test_history', JSON.stringify(history)); }, [history]);
            useEffect(() => { isPlayingRef.current = isPlaying; }, [isPlaying]);
            useEffect(() => { playbackStartPosRef.current = playbackStartPos; }, [playbackStartPos]);
            useEffect(() => { localStorage.setItem('eq_blind_test_norm_method', normalizationMethod); }, [normalizationMethod]);
            useEffect(() => {
                fetch('./model_weights.json').then(r => r.json()).then(w => setModelWeights(w)).catch(e => console.warn('Neuro-LUFS model weights not found.', e));
            }, []);
            useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : '');
                localStorage.setItem('eq_blind_test_theme', theme);
            }, [theme]);
            
            useEffect(() => {
                if (fs && STATE_FILE) {
                    try {
                        const stateObj = {
                            eqProfiles,
                            history,
                            theme,
                            normalizationMethod,
                            playlistPaths: playlist.map(s => ({ id: s.id, name: s.name, path: s.path }))
                        };
                        fs.writeFileSync(STATE_FILE, JSON.stringify(stateObj), 'utf8');
                    } catch(e) {}
                }
            }, [eqProfiles, history, theme, normalizationMethod, playlist]);

            const currentSong = playlist[currentSongIndex] || null;

            // Persistence Restore
            useEffect(() => {
                (async () => {
                    try {
                        if (fs && savedState.playlistPaths && savedState.playlistPaths.length > 0) {
                            setIsSongLoading(true); setLoadingMessage("Restoring playlist...");
                            const ctx = new (window.AudioContext || window.webkitAudioContext)();
                            audioCtxRef.current = ctx;
                            analyserNodeRef.current = ctx.createAnalyser();
                            const list = [];
                            
                            for (const s of savedState.playlistPaths) {
                                if (s.path && fs.existsSync(s.path)) {
                                    try {
                                        const fileBuffer = fs.readFileSync(s.path);
                                        const arrayBuffer = fileBuffer.buffer.slice(fileBuffer.byteOffset, fileBuffer.byteOffset + fileBuffer.byteLength);
                                        const buffer = await ctx.decodeAudioData(arrayBuffer);
                                        const rms = calcSongRMS(buffer);
                                        list.push({ id: s.id, name: s.name, buffer, duration: buffer.duration, rms, path: s.path });
                                        runAnalyzer(s.id, s.path);
                                    } catch (e) { console.error('Failed to load', s.path, e); }
                                }
                            }
                            setPlaylist(list);
                        }
                    } catch (e) { } finally { setIsSongLoading(false); setLoadingMessage(""); }
                })();
            }, []);

            const initAudio = async () => {
                if (!audioCtxRef.current) {
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    analyserNodeRef.current = audioCtxRef.current.createAnalyser();
                    analyserNodeRef.current.fftSize = 4096;
                }
                if (audioCtxRef.current.state === 'suspended') await audioCtxRef.current.resume();
                return audioCtxRef.current;
            };

            const runAnalyzer = (id, filePath) => {
                if (!child_process || !path_mod || !filePath) return;
                const analyzerPath = path_mod.join(__dirname, 'analyzer.py');
                child_process.exec(`python "${analyzerPath}" "${filePath}"`, (err, stdout) => {
                    if (err) return console.error('Analyzer error:', err);
                    try {
                        const data = JSON.parse(stdout);
                        if (data.true_lufs) {
                            setNeuroLufsData(prev => ({ ...prev, [id]: data }));
                        }
                    } catch (e) { console.error('Parse error:', e); }
                });
            };

            const predictLUFS = (psd, true_lufs, eq_resp) => {
                if (!modelWeights || !psd || !eq_resp) return 0;
                let x = [...psd, true_lufs, ...eq_resp];
                x = x.map((v, i) => (v - modelWeights.mean[i]) / (modelWeights.std[i] || 1));
                
                let current = x;
                for (let i = 0; i < modelWeights.layers.length; i++) {
                    const layer = modelWeights.layers[i];
                    const next = [];
                    for (let j = 0; j < layer.bias.length; j++) {
                        let sum = layer.bias[j];
                        for (let k = 0; k < current.length; k++) {
                            sum += current[k] * layer.weight[j][k];
                        }
                        next.push(layer.activation === 'relu' ? Math.max(0, sum) : sum);
                    }
                    current = next;
                }
                return current[0];
            };

            const handleFileSelect = async (e) => {
                const files = Array.from(e.target.files);
                if (files.length === 0) return;
                setIsSongLoading(true); setLoadingMessage("Saving...");
                const ctx = await initAudio();
                const news = [];
                for (const f of files) {
                    try {
                        const buf = await ctx.decodeAudioData(await f.arrayBuffer());
                        const id = Date.now().toString() + Math.random();
                        const rms = calcSongRMS(buf);
                        news.push({ id, name: f.name, buffer: buf, duration: buf.duration, rms, path: f.path });
                        if (f.path) runAnalyzer(id, f.path);
                    } catch (e) { }
                }
                setPlaylist(prev => [...prev, ...news]);
                setIsSongLoading(false); setLoadingMessage("");
            };

            const removeSong = async (idx) => {
                const s = playlist[idx];
                // Stop playback if removing the currently playing song or if playlist will be empty
                if (currentSongIndex === idx || playlist.length <= 1) {
                    try { sourceNodeRef.current?.stop(); } catch(e) {}
                    setIsPlaying(false); isPlayingRef.current = false;
                    cancelAnimationFrame(animationRef.current);
                }
                setPlaylist(p => p.filter((_, i) => i !== idx));
                // Adjust currentSongIndex
                if (idx < currentSongIndex) setCurrentSongIndex(i => Math.max(0, i - 1));
                else if (idx === currentSongIndex && currentSongIndex >= playlist.length - 1) setCurrentSongIndex(i => Math.max(0, i - 1));
            };

            const calculateLoudnessCompensation = async (profile, songObj) => {
                if (!profile || !songObj) return 0;
                const buffer = songObj.buffer;
                const cacheKey = `${buffer.duration}_${profile.id}_${profile.rawCode}_${normalizationMethod}`;
                if (autoGainCache[cacheKey] !== undefined) return autoGainCache[cacheKey];

                if (normalizationMethod === 'neuro_lufs' && neuroLufsData[songObj.id] && modelWeights) {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    const freqs = new Float32Array(63);
                    const log20 = Math.log10(20), log20k = Math.log10(20000);
                    for (let i=0; i<63; i++) freqs[i] = Math.pow(10, log20 + i*(log20k - log20)/62);

                    cx.textAlign = 'left';
                    active.forEach((p, ci) => {
                        const pts = series[p.id]; if (pts.length < 2) return;
                        cx.strokeStyle = gColors[ci % gColors.length]; cx.lineWidth = 2 * dpr; cx.beginPath();
                        pts.forEach((pt, j) => { j === 0 ? cx.moveTo(gToX(pt.x), gToY(pt.y)) : cx.lineTo(gToX(pt.x), gToY(pt.y)); });
                        cx.stroke();
                        const last = pts[pts.length - 1];
                        cx.fillStyle = gColors[ci % gColors.length]; cx.beginPath(); cx.arc(gToX(last.x), gToY(last.y), 4 * dpr, 0, Math.PI * 2); cx.fill();
                        const imgLabelText = `${p.name} (${Math.round(last.y)})`;
                        cx.font = `${11 * dpr}px ${sans}`;
                        const imgLabelW = cx.measureText(imgLabelText).width;
                        const imgLabelX = gToX(last.x) + 8 * dpr + imgLabelW > gx + gw - gPad.r ? gToX(last.x) - imgLabelW - 8 * dpr : gToX(last.x) + 8 * dpr;
                        cx.fillStyle = gColors[ci % gColors.length]; cx.textAlign = 'left';
                        cx.fillText(imgLabelText, imgLabelX, gToY(last.y) + 4 * dpr);
                    });
                    cx.restore();
                    y += graphH + gap;
                }
                // --- League Table ---
                if (leagueActive.length > 0) {
                    cx.fillStyle = fg; cx.font = `bold ${18 * dpr}px ${sans}`; cx.textAlign = 'left';
                    cx.fillText('League Table', padX, y + 30 * dpr);
                    y += titleH;

                    const leagueTableH = headerH + leagueActive.length * rowH;
                    cx.save();
                    roundRect(cx, padX, y, W - 2 * padX, leagueTableH, radius);
                    cx.strokeStyle = borderC; cx.lineWidth = 1 * dpr; cx.stroke();
                    cx.clip();

                    cx.fillStyle = headerBg; cx.fillRect(padX, y, W - 2 * padX, headerH);

                    const numCols = leagueActive.length + 1;
                    const colW = (W - 2 * padX) / numCols;

                    cx.fillStyle = mutedFg; cx.font = `bold ${10 * dpr}px ${sans}`; cx.textAlign = 'center';
                    leagueActive.forEach((p, i) => {
                        const cellX = padX + colW * (i + 1) + colW / 2;
                        cx.fillText(p.name.substring(0, 20), cellX, y + 28 * dpr);
                    });

                    cx.beginPath(); cx.moveTo(padX, y + headerH); cx.lineTo(W - padX, y + headerH); cx.strokeStyle = borderC; cx.stroke();
                    y += headerH;

                    leagueActive.forEach((row, rowIndex) => {
                        cx.textAlign = 'left'; cx.fillStyle = fg; cx.font = `bold ${11 * dpr}px ${sans}`;
                        cx.fillText(row.name.substring(0, 20), padX + 16 * dpr, y + 24 * dpr);

                        cx.textAlign = 'center';
                        leagueActive.forEach((col, colIndex) => {
                            const cellX = padX + colW * (colIndex + 1);

                            cx.beginPath(); cx.moveTo(cellX, y); cx.lineTo(cellX, y + rowH); cx.strokeStyle = borderC; cx.stroke();

                            if (row.id === col.id) {
                                cx.fillStyle = isDark ? 'rgba(255,255,255,0.03)' : 'rgba(0,0,0,0.03)';
                                cx.fillRect(cellX, y, colW, rowH);
                            } else {
                                const m = history.filter(h => (h.idA === row.id && h.idB === col.id) || (h.idA === col.id && h.idB === row.id));
                                let w = 0, l = 0, d = 0;
                                m.forEach(x => { if (x.winnerId === row.id) w++; else if (x.winnerId === col.id) l++; else d++; });

                                if (w + l + d > 0) {
                                    const text = `${w}-${l}${d > 0 ? `-${d}` : ''}`;
                                    cx.fillStyle = w > l ? '#4ade80' : l > w ? '#f87171' : mutedFg;
                                    cx.font = `${11 * dpr}px ${sans}`;
                                    cx.fillText(text, cellX + colW / 2, y + 24 * dpr);
                                } else {
                                    cx.fillStyle = mutedFg;
                                    cx.font = `${11 * dpr}px ${sans}`;
                                    cx.globalAlpha = 0.3;
                                    cx.fillText("-", cellX + colW / 2, y + 24 * dpr);
                                    cx.globalAlpha = 1.0;
                                }
                            }
                        });

                        if (rowIndex < leagueActive.length - 1) {
                            cx.beginPath(); cx.moveTo(padX, y + rowH); cx.lineTo(W - padX, y + rowH); cx.strokeStyle = borderC; cx.stroke();
                        }
                        y += rowH;
                    });
                    cx.textAlign = 'left';
                    cx.restore();
                    y += gap;
                }

                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = `eq_shootout_results_${Date.now()}.png`; a.click();
                    URL.revokeObjectURL(url);
                });
            };

            const handlePlaylistDragStart = (e, idx) => { setDragIndex(idx); e.dataTransfer.effectAllowed = 'move'; };
            const handlePlaylistDragOver = (e, idx) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; setDragOverIndex(idx); };
            const handlePlaylistDrop = (e, idx) => {
                e.preventDefault();
                if (dragIndex === null || dragIndex === idx) { setDragIndex(null); setDragOverIndex(null); return; }
                setPlaylist(prev => {
                    const next = [...prev];
                    const [moved] = next.splice(dragIndex, 1);
                    next.splice(idx, 0, moved);
                    // Update currentSongIndex 
                    if (currentSongIndex === dragIndex) setCurrentSongIndex(idx);
                    else if (dragIndex < currentSongIndex && idx >= currentSongIndex) setCurrentSongIndex(currentSongIndex - 1);
                    else if (dragIndex > currentSongIndex && idx <= currentSongIndex) setCurrentSongIndex(currentSongIndex + 1);
                    return next;
                });
                setDragIndex(null); setDragOverIndex(null);
            };
            const handlePlaylistDragEnd = () => { setDragIndex(null); setDragOverIndex(null); };

            const formatTimeDisplay = (s) => { const m = Math.floor(s / 60); const sc = Math.floor(s % 60); return `${m}:${sc.toString().padStart(2, '0')} `; };

            const progressPercent = currentSong ? (currentTime / currentSong.duration) * 100 : 0;
            const volumePercent = volume * 100;

            return (
                <div className="min-h-screen pb-20 bg-background text-foreground">
                    <header className="sticky top-0 z-50 bg-background/80 backdrop-blur-md border-b border-border text-sm">
                        <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center"><img src="./icon.svg" alt="App Icon" className="h-8 w-auto rounded-md" /></div>
                            <nav className="flex gap-4 font-medium items-center">
                                <button onClick={() => setMode('setup')} className={mode === 'setup' ? 'text-primary' : 'text-muted-foreground'}>Setup</button>
                                <button onClick={() => { if (mode !== 'test') { if (currentPair && currentPair.hiddenA) setMode('test'); else startTestRound(false); } else setMode('test'); }} className={mode === 'test' ? 'text-primary' : 'text-muted-foreground'}>Test</button>
                                <button onClick={() => setMode('results')} className={mode === 'results' ? 'text-primary' : 'text-muted-foreground'}>Results</button>
                                <button onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} className="p-1.5 rounded-lg text-muted-foreground hover:text-foreground transition-colors ml-2">{theme === 'dark' ? <Sun size={16} /> : <Moon size={16} />}</button>
                            </nav>
                        </div>
                    </header>

                    <main className="container mx-auto px-4 py-8 max-w-4xl relative">
                        <div className="bg-muted/50 rounded-xl p-6 mb-8 border border-border relative text-sm">
                            {isSongLoading && (
                                <div className="absolute inset-0 bg-background/50 flex items-center justify-center rounded-xl z-20 backdrop-blur-sm text-center">
                                    <div className="flex items-center gap-2 bg-background px-4 py-2 rounded-lg border border-border"><Loader2 className="spin size-4" /><span>{loadingMessage}</span></div>
                                </div>
                            )}
                            <div className="flex flex-col md:flex-row gap-4 justify-between items-center mb-4">
                                <div className="flex items-center gap-3 overflow-hidden w-full md:w-auto">
                                    <button onClick={() => setShowPlaylist(!showPlaylist)} className={`shrink-0 p-2 rounded-lg transition-colors ${showPlaylist ? 'bg-primary text-primary-foreground' : 'bg-muted hover:text-foreground'} `}><List size={18} /></button>
                                    <label className="shrink-0 bg-muted text-foreground p-2 rounded-lg cursor-pointer hover:bg-muted/80 border border-border"><Upload size={18} /><input type="file" accept="audio/*" multiple onChange={handleFileSelect} className="hidden" /></label>
                                    <div className="truncate flex-1 min-w-0"><div className="text-sm font-bold truncate">{currentSong ? currentSong.name : "Please load songs"}</div><div className="text-xs text-muted-foreground">{playlist.length} Songs</div></div>
                                </div>
                                <div className="flex items-center gap-3 w-full md:w-auto">
                                    <span className="text-[10px] font-mono opacity-60">VOL</span>
                                    <input
                                        type="range"
                                        min="0" max="1" step="0.01"
                                        value={volume}
                                        onChange={e => { setVolume(parseFloat(e.target.value)); if (gainNodeRef.current) gainNodeRef.current.gain.value = parseFloat(e.target.value); }}
                                        className="w-full md:w-24"
                                        style={{ background: `linear-gradient(to right, var(--slider-track-fill) ${volumePercent}%, var(--slider-track-bg) ${volumePercent}%)` }}
                                    />
                                </div>
                            </div>

                            {showPlaylist && playlist.length > 0 && (
                                <div className="mb-4 bg-background border border-border rounded-lg max-h-48 overflow-y-auto text-xs">
                                    <ul className="divide-y divide-border">
                                        {playlist.map((song, idx) => (
                                            <li key={song.id} draggable onDragStart={e => handlePlaylistDragStart(e, idx)} onDragOver={e => handlePlaylistDragOver(e, idx)} onDrop={e => handlePlaylistDrop(e, idx)} onDragEnd={handlePlaylistDragEnd} className={`p-2 flex items-center justify-between hover:bg-muted/30 cursor-grab ${currentSongIndex === idx ? 'bg-primary/10' : ''} ${dragIndex === idx ? 'dragging' : ''} ${dragOverIndex === idx ? 'drag-over' : ''} `}>
                                                <div className="flex items-center gap-1 text-muted-foreground"><GripVertical size={12} /></div>
                                                <button onClick={() => { setCurrentSongIndex(idx); pauseTimeRef.current = playbackStartPosRef.current; setCurrentTime(playbackStartPosRef.current); playAudio(true, song, true); }} className="truncate flex-1 text-left px-2">{idx + 1}. {song.name}</button>
                                                <button onClick={() => removeSong(idx)} className="text-muted-foreground hover:text-destructive p-1"><X size={14} /></button>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            )}

                            <div className="flex items-center gap-4">
                                <button onClick={() => playAudio()} disabled={!currentSong} className="size-12 shrink-0 rounded-full bg-foreground text-background flex items-center justify-center hover:scale-105 transition-transform disabled:opacity-50">{isPlaying ? <Pause size={24} /> : <Play size={24} />}</button>
                                <div className="w-full flex-col flex gap-2 mt-2">
                                    <div>
                                        <div className="flex justify-between text-[10px] font-mono text-muted-foreground mb-1">
                                            <span>Progress: {formatTimeDisplay(currentTime)}</span>
                                            <span>{formatTimeDisplay(currentSong?.duration || 0)}</span>
                                        </div>
                                        <input
                                            type="range"
                                            min="0" max={currentSong?.duration || 100} step="0.1"
                                            value={currentTime}
                                            onChange={e => { pauseTimeRef.current = parseFloat(e.target.value); if (isPlaying) playAudio(true, null, false); else setCurrentTime(parseFloat(e.target.value)); }}
                                            disabled={!currentSong}
                                            className="w-full"
                                            style={{ background: `linear-gradient(to right, var(--slider-track-fill) ${progressPercent}%, var(--slider-track-bg) ${progressPercent}%)` }}
                                        />
                                    </div>
                                    <div>
                                        <div className="flex justify-between text-[10px] font-mono text-muted-foreground mb-1">
                                            <span>Start Pos: {formatTimeDisplay(playbackStartPos)}</span>
                                        </div>
                                        <input
                                            type="range"
                                            min="0" max={currentSong?.duration || 100} step="0.1"
                                            value={playbackStartPos}
                                            onChange={e => {
                                                const newPos = parseFloat(e.target.value);
                                                setPlaybackStartPos(newPos);
                                                playbackStartPosRef.current = newPos;
                                            }}
                                            disabled={!currentSong}
                                            className="w-full opacity-60 hover:opacity-100 transition-opacity"
                                            style={{ background: `linear-gradient(to right, var(--slider-track-fill) ${currentSong ? (playbackStartPos / currentSong.duration) * 100 : 0}%, var(--slider-track-bg) ${currentSong ? (playbackStartPos / currentSong.duration) * 100 : 0}%)` }}
                                        />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {mode === 'setup' && (
                            <div className="space-y-6 animate-in fade-in text-sm">
                                <div className="flex justify-between items-center bg-muted/30 p-4 rounded-xl border border-border">
                                    <div>
                                        <h3 className="font-bold text-base">Normalization Method</h3>
                                        <p className="text-xs text-muted-foreground mt-1">Neuro-LUFS uses ML for instant O(1) adjustment.</p>
                                    </div>
                                    <select value={normalizationMethod} onChange={e => setNormalizationMethod(e.target.value)} className="bg-background border border-border rounded-lg px-3 py-1.5 text-xs">
                                        <option value="neuro_lufs">Neuro-LUFS (Fast)</option>
                                        <option value="legacy">Legacy RMS (Offline Render)</option>
                                    </select>
                                </div>
                                <div className="flex justify-between items-center mt-4">
                                    <h2 className="text-xl font-bold flex items-center gap-2"><Settings size={20} /> EQ Profiles</h2>
                                    <div className="flex gap-2">
                                        <label className="btn border border-border px-3 py-1.5 rounded-md text-xs cursor-pointer hover:bg-muted flex items-center gap-2"><Import size={12} /> Import<input type="file" multiple onChange={async (e) => {
                                            const fs = Array.from(e.target.files);
                                            for (const f of fs) {
                                                const text = await f.text();
                                                const data = { name: f.name.replace(/\.[^/.]+$/, ""), rawCode: text, ...parseEqualizerAPO(text) };
                                                setEqProfiles(prev => [...prev, { ...data, id: Date.now().toString() + Math.random(), rating: 1500, rd: 350, vol: 0.06, wins: 0, battles: 0, draws: 0, enabled: true, perSongRatings: {} }]);
                                            }
                                            setTestQueue([]);
                                        }} className="hidden" /></label>
                                        <button onClick={() => {
                                            setEqProfiles(p => [...p, { id: Date.now().toString(), name: 'New Profile', rawCode: '', bands: [], preamp: 0, rating: 1500, rd: 350, vol: 0.06, wins: 0, battles: 0, draws: 0, enabled: true, perSongRatings: {} }]);
                                            setTestQueue([]);
                                        }} className="btn bg-primary text-primary-foreground px-3 py-1.5 rounded-md text-xs flex items-center gap-2"><Plus size={12} /> New</button>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    {eqProfiles.map(p => (
                                        <div key={p.id} className={`border rounded-xl p-4 bg-background shadow-sm transition-opacity ${p.enabled !== false ? 'border-border' : 'border-border/50 opacity-60'} `}>
                                            <div className="flex flex-col md:flex-row justify-between mb-4 gap-4">
                                                <input className="font-bold text-lg bg-transparent border-b border-transparent focus:border-primary outline-none flex-1" value={p.name} onChange={e => setEqProfiles(prev => prev.map(pr => pr.id === p.id ? { ...pr, name: e.target.value } : pr))} />
                                                <div className="flex gap-2 items-center">
                                                    <button onClick={() => toggleProfileEnabled(p.id)} className={`flex items-center gap-2 text-[10px] font-bold px-3 py-1.5 rounded-full border transition-colors ${p.enabled !== false ? 'bg-green-500/10 text-green-500 border-green-500/20' : 'bg-zinc-800 text-zinc-500 border-zinc-700'} `}><Power size={10} />{p.enabled !== false ? 'Active' : 'Excluded'}</button>
                                                    <div className="flex bg-muted/50 rounded-lg p-1">
                                                        <button onClick={() => setEditorModes(v => ({ ...v, [p.id]: 'text' }))} className={`p-1.5 rounded-md ${editorModes[p.id] !== 'visual' ? 'bg-background shadow' : 'text-muted-foreground'} `}><FileText size={14} /></button>
                                                        <button onClick={() => setEditorModes(v => ({ ...v, [p.id]: 'visual' }))} className={`p-1.5 rounded-md ${editorModes[p.id] === 'visual' ? 'bg-background shadow' : 'text-muted-foreground'} `}><Sliders size={14} /></button>
                                                    </div>
                                                    <button onClick={() => { setEqProfiles(prev => prev.filter(pr => pr.id !== p.id)); setTestQueue([]); }} className="text-muted-foreground hover:text-destructive p-1"><Trash2 size={14} /></button>
                                                </div>
                                            </div>
                                            {editorModes[p.id] === 'visual' ? (
                                                <div className="space-y-2">
                                                    {p.bands.map((b, i) => (
                                                        <div key={i} className="grid grid-cols-12 gap-2 items-center bg-muted/20 p-2 rounded text-[10px] text-center">
                                                            <div className="col-span-2 text-left"><select value={b.type} onChange={e => updateBand(p.id, i, 'type', e.target.value)} className="w-full bg-transparent border border-border rounded p-0.5"><option value="peaking">PK</option><option value="lowshelf">LS</option><option value="highshelf">HS</option></select></div>
                                                            <div className="col-span-3"><input type="number" value={b.freq} onChange={e => updateBand(p.id, i, 'freq', e.target.value)} className="w-full bg-transparent text-center" />Hz</div>
                                                            <div className="col-span-3"><input type="number" value={b.gain} onChange={e => updateBand(p.id, i, 'gain', e.target.value)} className="w-full bg-transparent text-center" />dB</div>
                                                            <div className="col-span-3"><input type="number" value={b.q} onChange={e => updateBand(p.id, i, 'q', e.target.value)} className="w-full bg-transparent text-center" />Q</div>
                                                            <div className="col-span-1 text-right"><button onClick={() => removeBand(p.id, i)} className="text-muted-foreground hover:text-destructive"><Trash2 size={12} /></button></div>
                                                        </div>
                                                    ))}
                                                    <button onClick={() => addBand(p.id)} className="w-full py-1.5 border border-dashed border-border rounded text-[10px] text-muted-foreground hover:bg-muted transition-colors">+ Add Filter Band</button>
                                                </div>
                                            ) : (
                                                <textarea className="w-full h-32 bg-muted/30 border border-border rounded-lg p-3 font-mono text-xs focus:ring-1 focus:ring-primary focus:outline-none resize-none" defaultValue={p.rawCode} onChange={(e) => {
                                                    const text = e.target.value; const parsed = parseEqualizerAPO(text);
                                                    setEqProfiles(prev => prev.map(pr => pr.id === p.id ? { ...pr, bands: parsed.bands, preamp: parsed.preamp, rawCode: text } : pr));
                                                }} />
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {mode === 'test' && (
                            <div className="flex flex-col items-center gap-8 py-4 animate-in fade-in slide-in-from-bottom-4 duration-500 w-full">
                                <div className="text-center w-full">
                                    <div className="inline-block bg-white text-black px-4 py-1.5 rounded-full text-xs font-bold mb-4 border border-white/20">Round {history.length + 1}</div>
                                    <h2 className="text-xl font-bold mb-1 text-sm">Blind A/B Test</h2>
                                    <p className="text-muted-foreground text-xs opacity-70 italic">Now Playing: {currentSong?.name || "..."}</p>
                                </div>
                                {currentPair.hiddenA && (
                                    <div className="w-full max-w-2xl mx-auto text-sm">
                                        <div className="grid grid-cols-2 gap-4 w-full h-64 mb-8">
                                            <button onClick={() => switchSource('A')} className={`relative rounded-2xl border-2 transition-all duration-300 overflow-hidden flex flex-col items-start p-6 text-left group ${activeSource === 'A' ? 'border-white bg-zinc-900 shadow-xl opacity-100' : 'border-zinc-800 bg-black opacity-40 hover:opacity-100'} `}>
                                                <span className={`text-3xl font-bold mb-2 ${activeSource === 'A' ? 'text-white' : 'text-zinc-500'} `}>Play A</span>
                                                <div className="flex-1 w-full flex items-end"><Visualizer analyser={analyserNodeRef.current} isActive={activeSource === 'A' && isPlaying} /></div>
                                            </button>
                                            <button onClick={() => switchSource('B')} className={`relative rounded-2xl border-2 transition-all duration-300 overflow-hidden flex flex-col items-start p-6 text-left group ${activeSource === 'B' ? 'border-white bg-zinc-900 shadow-xl opacity-100' : 'border-zinc-800 bg-black opacity-40 hover:opacity-100'} `}>
                                                <span className={`text-3xl font-bold mb-2 ${activeSource === 'B' ? 'text-white' : 'text-zinc-500'} `}>Play B</span>
                                                <div className="flex-1 w-full flex items-end"><Visualizer analyser={analyserNodeRef.current} isActive={activeSource === 'B' && isPlaying} /></div>
                                            </button>
                                        </div>
                                        <div className="grid grid-cols-3 gap-4 w-full h-16">
                                            <button onClick={() => handleVote(activeSource)} className={`col-span-2 h-full font-bold border rounded-xl transition-all ${!activeSource ? 'border-white/10 bg-black opacity-50' : 'border-white/20 bg-white/5 text-white hover:bg-white hover:text-black shadow-lg'} `} disabled={!activeSource}>Prefer {activeSource || '...'}</button>
                                            <button onClick={() => handleVote('Tie')} className="h-full border border-white/10 bg-black/20 text-muted-foreground rounded-xl hover:bg-white/10 hover:text-white transition-all">Tie</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {mode === 'results' && (
                            <div className="space-y-12 animate-in fade-in text-sm">
                                <div className="flex flex-wrap justify-end gap-2">
                                    <div className="flex gap-1">
                                        <button onClick={() => exportData('rankings', 'csv')} className="border border-border text-muted-foreground hover:text-foreground px-3 py-1.5 rounded-lg text-[10px] flex items-center gap-1 transition-colors"><Download size={10} /> Rankings CSV</button>
                                        <button onClick={() => exportData('rankings', 'json')} className="border border-border text-muted-foreground hover:text-foreground px-3 py-1.5 rounded-lg text-[10px] flex items-center gap-1 transition-colors"><Download size={10} /> Rankings JSON</button>
                                        <button onClick={() => exportData('history', 'csv')} className="border border-border text-muted-foreground hover:text-foreground px-3 py-1.5 rounded-lg text-[10px] flex items-center gap-1 transition-colors"><Download size={10} /> History CSV</button>
                                        <button onClick={() => exportData('history', 'json')} className="border border-border text-muted-foreground hover:text-foreground px-3 py-1.5 rounded-lg text-[10px] flex items-center gap-1 transition-colors"><Download size={10} /> History JSON</button>
                                        <button onClick={exportResultsAsImage} className="border border-border text-muted-foreground hover:text-foreground px-3 py-1.5 rounded-lg text-[10px] flex items-center gap-1 transition-colors bg-primary/10"><Camera size={10} /> Save as Image</button>
                                    </div>
                                    {!isResetConfirming ? (
                                        <button onClick={() => setIsResetConfirming(true)} className="border border-red-500/50 text-red-500 hover:bg-red-500/10 px-4 py-1.5 rounded-lg transition-colors flex items-center gap-2 text-[10px]"><RotateCcw size={12} /> Reset</button>
                                    ) : (
                                        <div className="flex items-center gap-2 text-sm"><span className="text-[10px] text-red-400 font-bold flex items-center gap-1"><AlertCircle size={12} /> Are you sure?</span><button onClick={executeReset} className="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold hover:bg-red-700">Yes, Reset</button><button onClick={() => setIsResetConfirming(false)} className="bg-muted text-muted-foreground px-3 py-1.5 rounded-lg text-[10px]">Cancel</button></div>
                                    )}
                                </div>

                                <section>
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Award size={20} /> Ranking</h2>
                                    <div className="bg-background border border-border rounded-xl overflow-hidden text-xs">
                                        <table className="w-full text-left">
                                            <thead className="bg-muted/50 text-muted-foreground uppercase text-[10px] tracking-wider"><tr><th className="p-3">Rank</th><th className="p-3">Name</th><th className="p-3 text-right">Rating</th><th className="p-3 text-right">RD</th><th className="p-3 text-right">σ</th><th className="p-3 text-right">Status</th><th className="p-3 text-right">Win Rate</th><th className="p-3 text-right">W/L/D</th></tr></thead>
                                            <tbody>{eqProfiles.filter(p => p.enabled !== false).sort((a, b) => (b.rating || 1500) - (a.rating || 1500)).map((p, i) => {
                                                const badge = getConvergenceBadge(p.rd || 350);
                                                return (
                                                    <tr key={p.id} className="border-b border-border last:border-0">
                                                        <td className="p-3 font-mono font-bold text-muted-foreground">{i + 1}</td>
                                                        <td className="p-3 font-medium">{p.name}</td>
                                                        <td className="p-3 text-right font-bold text-primary">{Math.round(p.rating || 1500)}</td>
                                                        <td className="p-3 text-right font-mono text-muted-foreground" title={`95 % CI: ${Math.round((p.rating || 1500) - 2 * (p.rd || 350))} — ${Math.round((p.rating || 1500) + 2 * (p.rd || 350))} `}>±{Math.round(p.rd || 350)}</td>
                                                        <td className="p-3 text-right font-mono text-muted-foreground">{(p.vol || 0.06).toFixed(6)}</td>
                                                        <td className="p-3 text-right"><span className={`text-[9px] font-bold px-2 py-0.5 rounded-full border ${badge.color} `}>{badge.label}</span></td>
                                                        <td className="p-3 text-right font-bold">{p.battles ? Math.round((p.wins / p.battles) * 100) : 0}%</td>
                                                        <td className="p-3 text-right text-muted-foreground">{p.wins || 0}/{(p.battles || 0) - (p.wins || 0) - (p.draws || 0)}/{p.draws || 0}</td>
                                                    </tr>);
                                            })}</tbody>
                                        </table>
                                    </div>
                                </section>

                                {history.length > 0 && (
                                    <section>
                                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><TrendingUp size={20} /> Rating Progression</h2>
                                        <div className="bg-background border border-border rounded-xl p-4 overflow-hidden">
                                            <canvas ref={el => {
                                                if (!el || history.length === 0) return;
                                                const dpr = window.devicePixelRatio || 2;
                                                const cssW = 780, cssH = 360;
                                                el.width = cssW * dpr; el.height = cssH * dpr;
                                                el.style.width = cssW + 'px'; el.style.height = cssH + 'px';
                                                const cx = el.getContext('2d');
                                                cx.scale(dpr, dpr);
                                                cx.clearRect(0, 0, cssW, cssH);
                                                const W = cssW, H = cssH;
                                                const isDark = theme === 'dark';
                                                const gridColor = isDark ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
                                                const textColor = isDark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.4)';
                                                const colors = ['#f87171', '#60a5fa', '#34d399', '#fbbf24', '#a78bfa', '#fb923c', '#f472b6', '#2dd4bf'];
                                                const active = eqProfiles.filter(p => p.enabled !== false);
                                                if (active.length === 0) return;
                                                const reversed = [...history].reverse();
                                                const series = {};
                                                active.forEach(p => { series[p.id] = [{ x: 0, y: 1500 }]; });
                                                reversed.forEach((h, idx) => {
                                                    active.forEach(p => {
                                                        const arr = series[p.id];
                                                        if (h.idA === p.id || h.idB === p.id) {
                                                            const r = h.idA === p.id ? (h.ratingA || arr[arr.length - 1].y) : (h.ratingB || arr[arr.length - 1].y);
                                                            arr.push({ x: idx + 1, y: r });
                                                        }
                                                    });
                                                });
                                                const allY = Object.values(series).flat().map(pt => pt.y);
                                                const minY = Math.floor((Math.min(...allY) - 50) / 50) * 50;
                                                const maxY = Math.ceil((Math.max(...allY) + 50) / 50) * 50;
                                                const maxX = reversed.length;
                                                const pad = { l: 50, r: 20, t: 10, b: 30 };
                                                const pw = W - pad.l - pad.r, ph = H - pad.t - pad.b;
                                                const toX = (x) => pad.l + (x / Math.max(maxX, 1)) * pw;
                                                const toY = (y) => pad.t + ph - ((y - minY) / Math.max(maxY - minY, 1)) * ph;
                                                cx.strokeStyle = gridColor; cx.lineWidth = 1;
                                                for (let v = minY; v <= maxY; v += 50) { cx.beginPath(); cx.moveTo(pad.l, toY(v)); cx.lineTo(W - pad.r, toY(v)); cx.stroke(); }
                                                cx.fillStyle = textColor; cx.font = '11px monospace'; cx.textAlign = 'right';
                                                for (let v = minY; v <= maxY; v += 100) { cx.fillText(v, pad.l - 6, toY(v) + 3); }
                                                cx.strokeStyle = isDark ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.2)'; cx.setLineDash([4, 4]); cx.beginPath(); cx.moveTo(pad.l, toY(1500)); cx.lineTo(W - pad.r, toY(1500)); cx.stroke(); cx.setLineDash([]);
                                                active.forEach((p, ci) => {
                                                    const pts = series[p.id]; if (pts.length < 2) return;
                                                    cx.strokeStyle = colors[ci % colors.length]; cx.lineWidth = 2; cx.beginPath();
                                                    pts.forEach((pt, j) => { j === 0 ? cx.moveTo(toX(pt.x), toY(pt.y)) : cx.lineTo(toX(pt.x), toY(pt.y)); });
                                                    cx.stroke();
                                                    const last = pts[pts.length - 1];
                                                    cx.fillStyle = colors[ci % colors.length]; cx.beginPath(); cx.arc(toX(last.x), toY(last.y), 4, 0, Math.PI * 2); cx.fill();
                                                    const labelText = `${p.name} (${Math.round(last.y)})`;
                                                    cx.font = '11px sans-serif';
                                                    const labelW = cx.measureText(labelText).width;
                                                    const labelX = toX(last.x) + 8 + labelW > W - pad.r ? toX(last.x) - labelW - 8 : toX(last.x) + 8;
                                                    cx.fillStyle = colors[ci % colors.length]; cx.textAlign = 'left';
                                                    cx.fillText(labelText, labelX, toY(last.y) + 3);
                                                });
                                            }} className="w-full" style={{ maxHeight: '360px' }} />
                                        </div>
                                    </section>
                                )}

                                {playlist.length > 0 && (
                                    <section>
                                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Music size={20} /> Per-Song Rankings</h2>
                                        <div className="mb-3">
                                            <select value={selectedSongFilter} onChange={e => setSelectedSongFilter(e.target.value)} className="bg-muted border border-border rounded-lg px-3 py-1.5 text-xs">
                                                <option value="__all__">All Songs (Overall)</option>
                                                {playlist.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        </div>
                                        {selectedSongFilter !== '__all__' && (
                                            <div className="bg-background border border-border rounded-xl overflow-hidden text-xs">
                                                <table className="w-full text-left">
                                                    <thead className="bg-muted/50 text-muted-foreground uppercase text-[10px] tracking-wider"><tr><th className="p-3">Rank</th><th className="p-3">Name</th><th className="p-3 text-right">Rating</th><th className="p-3 text-right">RD</th><th className="p-3 text-right">Status</th></tr></thead>
                                                    <tbody>{eqProfiles.filter(p => p.enabled !== false).map(p => {
                                                        const psr = (p.perSongRatings || {})[selectedSongFilter] || { rating: 1500, rd: 350 };
                                                        return { ...p, songRating: psr.rating, songRd: psr.rd };
                                                    }).sort((a, b) => b.songRating - a.songRating).map((p, i) => {
                                                        const badge = getConvergenceBadge(p.songRd);
                                                        return (
                                                            <tr key={p.id} className="border-b border-border last:border-0">
                                                                <td className="p-3 font-mono font-bold text-muted-foreground">{i + 1}</td>
                                                                <td className="p-3 font-medium">{p.name}</td>
                                                                <td className="p-3 text-right font-bold text-primary">{Math.round(p.songRating)}</td>
                                                                <td className="p-3 text-right font-mono text-muted-foreground">±{Math.round(p.songRd)}</td>
                                                                <td className="p-3 text-right"><span className={`text-[9px] font-bold px-2 py-0.5 rounded-full border ${badge.color} `}>{badge.label}</span></td>
                                                            </tr>);
                                                    })}</tbody>
                                                </table>
                                            </div>
                                        )}
                                    </section>
                                )}

                                {history.length > 0 && (
                                    <section>
                                        <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><Clock size={20} /> Match History</h2>
                                        <div className="bg-background border border-border rounded-xl overflow-hidden text-xs">
                                            <table className="w-full text-left">
                                                <thead className="bg-muted/50 text-muted-foreground uppercase text-[10px] tracking-wider"><tr><th className="p-3">Time</th><th className="p-3">Song</th><th className="p-3">Match</th><th className="p-3 text-center">Result</th><th className="p-3 text-right">Duration</th></tr></thead>
                                                <tbody>{history.slice(0, historyShowCount).map((h, i) => (
                                                    <tr key={i} className="border-b border-border last:border-0">
                                                        <td className="p-3 font-mono text-muted-foreground text-[10px]">{new Date(h.timestamp).toLocaleString()}</td>
                                                        <td className="p-3 truncate max-w-[120px]" title={h.song}>{h.song}</td>
                                                        <td className="p-3"><span className={h.vote === 'A' ? 'font-bold' : ''}>{h.profileA}</span> <span className="text-muted-foreground mx-1">vs</span> <span className={h.vote === 'B' ? 'font-bold' : ''}>{h.profileB}</span></td>
                                                        <td className="p-3 text-center">{h.vote === 'Tie' ? <span className="text-muted-foreground">Tie</span> : <span className="font-bold">{h.vote === 'A' ? h.profileA : h.profileB}</span>}</td>
                                                        <td className="p-3 text-right font-mono text-muted-foreground">{h.duration ? `${(h.duration / 1000).toFixed(1)} s` : '—'}</td>
                                                    </tr>
                                                ))}</tbody>
                                            </table>
                                            {history.length > historyShowCount && (
                                                <div className="p-3 text-center border-t border-border">
                                                    <button onClick={() => setHistoryShowCount(c => c + 20)} className="text-[10px] text-muted-foreground hover:text-foreground transition-colors">Show more ({history.length - historyShowCount} remaining)</button>
                                                </div>
                                            )}
                                        </div>
                                    </section>
                                )}

                                <section>
                                    <h2 className="text-lg font-bold mb-4 flex items-center gap-2"><BarChart3 size={20} /> League Table</h2>
                                    <div className="overflow-x-auto text-[10px]"><table className="w-full border-collapse"><thead><tr><th className="p-2 border border-border bg-muted/30"></th>{eqProfiles.filter(p => p.enabled !== false).map(p => <th key={p.id} className="p-2 border border-border bg-muted/30 min-w-[80px] truncate max-w-[100px]" title={p.name}>{p.name}</th>)}</tr></thead><tbody>{eqProfiles.filter(p => p.enabled !== false).map(row => <tr key={row.id}><th className="p-2 border border-border bg-muted/30 text-left truncate max-w-[100px]" title={row.name}>{row.name}</th>{eqProfiles.filter(p => p.enabled !== false).map(col => { if (row.id === col.id) return <td key={col.id} className="bg-muted/50 border border-border"></td>; const m = history.filter(h => (h.idA === row.id && h.idB === col.id) || (h.idA === col.id && h.idB === row.id)); let w = 0, l = 0, d = 0; m.forEach(x => { if (x.winnerId === row.id) w++; else if (x.winnerId === col.id) l++; else d++; }); if (w + l + d === 0) return <td key={col.id} className="border border-border text-center text-muted-foreground opacity-30">-</td>; return <td key={col.id} className={`border border-border text-center ${w > l ? 'text-green-400' : l > w ? 'text-red-400' : 'text-muted-foreground'} `}>{w}-{l}{d > 0 ? ` - ${d}` : ''}</td>; })}</tr>)}</tbody></table></div>
                                </section>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
